name: Build Android

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix permissions
        run: chmod +x android/gradlew

      # === SOLUCIÓN PRINCIPAL ===
      - name: Upgrade AGP and dependencies
        run: |
          cd android
          # Fuerza versiones compatibles
          sed -i 's/com.android.application:[0-9.]\+/com.android.application:8.7.0/' build.gradle
          sed -i 's/com.android.library:[0-9.]\+/com.android.library:8.7.0/' build.gradle || true

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: moquegua-explorer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
