# ─── Configuración de Gradle ──────────────────────────────────────────────────
# Documentación: http://www.gradle.org/docs/current/userguide/build_environment.html

# JVM con más memoria: necesario para builds con MapLibre + Tailwind v4
# Aumentado de 1536m a 2048m para evitar OutOfMemoryError en gama baja
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Compilación en paralelo: acelera builds ~40% en proyectos multi-módulo
org.gradle.parallel=true

# Caché de Gradle: evita recompilar módulos que no cambiaron
org.gradle.caching=true

# Gradle daemon: mantiene la JVM caliente entre builds consecutivos
org.gradle.daemon=true

# Configuración bajo demanda: solo configura los subproyectos necesarios
org.gradle.configureondemand=true

# AndroidX: estructura de paquetes moderna (requerido por Capacitor 8)
android.useAndroidX=true
# Jetifier: ayuda con librerías antiguas (recomendado para compatibilidad)
android.enableJetifier=true

# R8 en modo completo: ofuscación y optimización agresiva del bytecode
# Reduce el tamaño del APK y mejora el rendimiento en tiempo de ejecución
android.enableR8.fullMode=true


